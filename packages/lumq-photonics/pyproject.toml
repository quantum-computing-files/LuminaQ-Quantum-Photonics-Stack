[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lumq-photonics"
version = "0.1.0"
description = "LuminaQ photonic core: states, gates, measurements, phase-space"
requires-python = ">=3.10"
dependencies = ["jax>=0.4.25", "jaxlib>=0.4.25", "numpy>=1.26", "scipy>=1.12", "matplotlib>=3.8", "pydantic>=2.6"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]
gpu = ["jax[cuda12]"]

[tool.hatch.build.targets.wheel]
packages = ["lumq"]
