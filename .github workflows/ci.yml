name: LuminaQ CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install --upgrade pip
          pip install "jax[cpu]" numpy scipy matplotlib pydantic
          pip install fastapi "uvicorn[standard]" websockets pydantic-settings python-multipart anyio
          pip install pytest pytest-asyncio httpx ruff
          pip install -e packages/lumq-photonics
          pip install -e packages/lumq-compiler
          pip install -e packages/lumq-backends
          pip install -e packages/lumq-api
          pip install -e packages/lumq-algorithms
      - name: Lint
        run: ruff check packages/ --select=E,F,I || true
      - name: Test photonics
        run: pytest packages/lumq-photonics/tests/ -v
      - name: Test compiler
        run: pytest packages/lumq-compiler/tests/ -v
      - name: Test backends
        run: pytest packages/lumq-backends/tests/ -v
      - name: Test api
        run: pytest packages/lumq-api/tests/ -v
      - name: Test algorithms
        run: pytest packages/lumq-algorithms/tests/ -v


      
